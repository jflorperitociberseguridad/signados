# Nginx config for the static React frontend container.
# All /api requests are forwarded to the backend container by the EDGE proxy
# (Caddy) — this nginx only serves the SPA build.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for client-side routes (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed static assets
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Service worker should not be cached aggressively
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache";
    }

    # Manifest must be served fresh
    location = /manifest.json {
        expires off;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
